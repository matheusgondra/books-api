api:
  jwt:
    secret: ${JWT_SECRET:mySecretKey}
    
server:
  port: ${PORT:8080}

spring:
  application:
    name: books
  web:
    error:
      include-stacktrace: never
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/books_db}
    username: ${DB_USER:dev}
    password: ${DB_PASSWORD:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
